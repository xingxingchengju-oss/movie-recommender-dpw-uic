<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recommend - Reelvana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  {% include "_sidebar.html" %}

  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">Recommend</h1>
      <p class="page-subtitle">Discover films tailored to your taste</p>
    </div>

    <div class="rec-tabs" role="tablist">
      <button type="button" class="rec-tab active" data-tab="by-movie" role="tab" aria-selected="true">By Movie</button>
      <button type="button" class="rec-tab" data-tab="for-user" role="tab" aria-selected="false">For User</button>
    </div>

    <!-- Tab: By Movie (V1, unchanged behavior) -->
    <section id="tab-by-movie" class="rec-tab-panel active" role="tabpanel">
      <div class="rec-search-wrap">
        <input
          type="text"
          id="rec-search"
          class="rec-search-input"
          placeholder="Search for a movie (e.g. Inception, Toy Story, The Godfather)…"
          autocomplete="off"
        />
        <ul id="rec-suggestions" class="rec-suggestions" role="listbox"></ul>
      </div>

      <div id="rec-selected" class="rec-selected"></div>
      <div id="rec-results" class="movie-grid"></div>
    </section>

    <!-- Tab: For User (SVD collaborative filtering, driven by sidebar) -->
    <section id="tab-for-user" class="rec-tab-panel" role="tabpanel" hidden>
      <div class="rec-user-lookup">
        <label class="rec-user-lookup-label" for="rec-user-lookup-input">
          Try another MovieLens user ID
        </label>
        <div class="rec-user-lookup-row">
          <input
            type="number"
            id="rec-user-lookup-input"
            class="rec-user-lookup-input"
            placeholder="e.g. 41, 95, 493"
            min="1"
            inputmode="numeric"
            autocomplete="off"
          />
          <button type="button" id="rec-user-lookup-btn" class="rec-user-lookup-btn">
            Load recommendations
          </button>
        </div>
        <p class="rec-user-lookup-help">
          The sidebar shows curated demo profiles; this field tests any trained MovieLens user.
        </p>
        <p id="rec-user-lookup-err" class="rec-user-lookup-err" hidden></p>
      </div>

      <div id="rec-user-status" class="rec-user-status">
        Pick a profile from the sidebar, or enter a MovieLens user ID.
      </div>
      <div id="rec-user-results" class="movie-grid"></div>
    </section>
  </main>

  <script>lucide.createIcons();</script>
  <script src="{{ url_for('static', filename='user_profile.js') }}"></script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
