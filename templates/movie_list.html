<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movies - Reelvana</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#00D4AA" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M7 4v16M17 4v16M2 9h5M17 9h5M2 15h5M17 15h5"/>
      </svg>
      <span class="logo-text">Reelvana</span>
    </div>
    <ul class="sidebar-nav">
      <li>
        <a href="{{ url_for('page_movie_list') }}" class="nav-link {% if active_page == 'movies' %}active{% endif %}" data-page="movies">
          <i data-lucide="film"></i>
          <span>Movies</span>
        </a>
      </li>
      <li>
        <a href="/analysis" class="nav-link {% if active_page == 'analysis' %}active{% endif %}" data-page="analysis">
          <i data-lucide="bar-chart-3"></i>
          <span>Analysis</span>
        </a>
      </li>
      <li>
        <a href="/recommender" class="nav-link {% if active_page == 'recommender' %}active{% endif %}" data-page="recommender">
          <i data-lucide="sparkles"></i>
          <span>Recommend</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
      <h1 class="page-title">Movies</h1>
      <p class="page-subtitle" id="movie-count"></p>
    </div>

    <!-- Toolbar: Sort + Genre Filters -->
    <div class="toolbar">
      <div class="sort-row">
        <span class="sort-label">Sort By</span>
        <div class="custom-select" id="sort-select" data-value="normal">
          <button class="custom-select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span class="custom-select-value">Normal</span>
            <svg class="custom-select-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <ul class="custom-select-dropdown" role="listbox">
            <li class="custom-select-option active" data-value="normal" role="option">Normal</li>
            <li class="custom-select-option" data-value="rate" role="option">Rating</li>
            <li class="custom-select-option" data-value="date" role="option">Date</li>
          </ul>
        </div>
      </div>
      <div class="genre-filters" id="genre-filters">
        <!-- Genre tags rendered by JS -->
      </div>
    </div>

    <!-- Movie Grid -->
    <div class="movie-grid" id="movie-grid">
      <!-- Movie cards rendered by JS -->
    </div>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
